name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "apps/server/**"
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "scripts/**"
      - ".github/workflows/release.yml"
      - "mise.toml"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - "tsconfig.web.json"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      skipped: ${{ steps.check.outputs.skipped }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - name: Check if version bump needed
        id: check
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          if [[ "$LAST_MSG" == chore\(release\):* ]]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine bump type from commits
        if: steps.check.outputs.skipped == 'false'
        id: bump-type
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          SUBJECTS=$(git log $RANGE --pretty="%s")
          BODIES=$(git log $RANGE --pretty="%b")

          if echo "$SUBJECTS" | grep -qE "^[a-z]+(\(.+\))?!:"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$BODIES" | grep -qE "^BREAKING CHANGE:"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$SUBJECTS" | grep -qE "^feat(\(.+\))?:"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: steps.check.outputs.skipped == 'false'
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ steps.bump-type.outputs.type }} --no-git-tag-version)
          pnpm --filter @mdcz/desktop exec npm version "$NEW_VERSION" --no-git-tag-version
          echo "version=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        if: steps.check.outputs.skipped == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json apps/desktop/package.json
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          git tag ${{ steps.bump.outputs.tag }}
          git push origin main --tags

  build:
    needs: version
    if: needs.version.outputs.skipped == 'false'

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: build:linux
            artifact: desktop-linux
            glob: "release/*/*.AppImage"
          - os: windows-latest
            script: build:win
            artifact: desktop-windows
            glob: "release/*/*.exe"
          - os: macos-latest
            script: build:mac
            artifact: desktop-macos
            glob: |
              release/*/*.dmg
              release/*/*.zip
          - os: ubuntu-latest
            script: package:webui
            artifact: webui-portable
            glob: "release/mdcz-*.tar.gz"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: jdx/mise-action@v4

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MDCZ_RELEASE_VERSION: ${{ needs.version.outputs.version }}

      - uses: actions/upload-artifact@v6
        with:
          name: dist-${{ matrix.artifact }}
          path: ${{ matrix.glob }}
          if-no-files-found: error
          retention-days: 1

  docker:
    needs: version
    if: needs.version.outputs.skipped == 'false'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            MDCZ_RELEASE_VERSION=${{ needs.version.outputs.version }}
          tags: |
            ghcr.io/shotheadman/mdcz:${{ needs.version.outputs.version }}
            ghcr.io/shotheadman/mdcz:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [version, build, docker]
    if: needs.version.outputs.skipped == 'false'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd dist
          find . -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Build release notes
        run: |
          cat > release-guide.md <<'NOTES'
          ## Distribution Guide

          ### Desktop users

          - Windows: download the NSIS `Setup` installer for normal installs. Use the portable `.exe` only when you need a no-install copy.
          - macOS: download the `.dmg` for manual installation. The `.zip` is also attached for users who prefer archive-based installation.
          - Linux: download the `.AppImage`.
          - Current Desktop builds are unsigned. Windows SmartScreen and macOS Gatekeeper may show warnings until signing and notarization certificates are added.
          - Verify downloads with `SHA256SUMS.txt` when downloading assets manually.

          ### Docker self-hosters

          - Pull `ghcr.io/shotheadman/mdcz:${{ needs.version.outputs.version }}` for a pinned deployment.
          - Pull `ghcr.io/shotheadman/mdcz:latest` only when you intentionally track the newest published image.

          ### No-Docker self-hosters

          - Download `mdcz-${{ needs.version.outputs.version }}.tar.gz`.
          - This is a lightweight Node bundle and does not include `node_modules` or a bundled Node runtime.
          - Install Node.js 24 or newer, extract the archive, then run `./install.sh` (Linux/macOS) or `.\install.ps1` (Windows). The setup helper skips Node handling when a compatible Node is already installed.
          - Start with `./start.sh` or `.\start.bat`; follow the bundled README for systemd and environment configuration.

          NOTES

          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name='${{ needs.version.outputs.tag }}' \
            --jq .body > generated-notes.md

          cat release-guide.md generated-notes.md > release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: MDCz ${{ needs.version.outputs.tag }}
          draft: true
          body_path: release-notes.md
          overwrite_files: true
          files: dist/**/*
